[build]
builder = "nixpacks"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["glib", "python311", "stdenv.cc.cc.lib"]

[build.nixpacksPlan.phases.install]
cmds = [
  "pip install --upgrade pip",
  "pip install -r requirements.txt -c constraints.txt",
  "pip uninstall -y opencv-python || true",
  "python -c \"import cv2; print('[OK] cv2', cv2.__version__)\"",
  "python -c \"import ultralytics; print('[OK] ultralytics', ultralytics.__version__)\"",
  "python -c \"import flask; print('[OK] flask', flask.__version__)\"",
  "python -c \"import eventlet; print('[OK] eventlet', eventlet.__version__)\""
]

[deploy]
startCommand = "gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT --timeout 120 --keep-alive 5 --log-level debug app:app"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[deploy.envVars]
PYTHONUNBUFFERED = "1"
PYTHONDONTWRITEBYTECODE = "1"
