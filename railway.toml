[build]
builder = "nixpacks"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["libGL", "libGLU", "glib", "python311"]

[build.nixpacksPlan.phases.install]
cmds = [
  "pip install --upgrade pip",
  "pip install -r requirements.txt",
  "pip uninstall -y opencv-python && pip install opencv-python-headless==4.9.0.80"
]

[deploy]
startCommand = "gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT --timeout 120 --keep-alive 5 app:app"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[deploy.envVars]
PYTHONUNBUFFERED = "1"
PYTHONDONTWRITEBYTECODE = "1"
