[build]
builder = "nixpacks"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["glib", "python311"]

[build.nixpacksPlan.phases.install]
cmds = [
  "pip install --upgrade pip",

  # Tüm bağımlılıkları kur; constraints.txt opencv-python (full)'ü engeller
  "pip install -r requirements.txt -c constraints.txt",

  # ultralytics yine de full opencv kurmuşsa temizle
  "pip uninstall -y opencv-python || true",

  # Doğrula
  "python -c \"import cv2; print('[OK] cv2', cv2.__version__)\"",
  "python -c \"import ultralytics; print('[OK] ultralytics', ultralytics.__version__)\""
]

[deploy]
startCommand = "gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT --timeout 120 --keep-alive 5 app:app"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[deploy.envVars]
PYTHONUNBUFFERED = "1"
PYTHONDONTWRITEBYTECODE = "1"
